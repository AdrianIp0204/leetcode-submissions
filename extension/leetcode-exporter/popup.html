<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LeetCode Repo Exporter</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main>
      <header>
        <h1>LeetCode Exporter</h1>
        <p>Save submissions into your private repo.</p>
        <p class="version">Extension version <strong id="extensionVersion">-</strong></p>
      </header>

      <button id="collect" type="button">Collect Current Solution</button>

      <section class="settings">
        <label>
          <input id="autoCapture" type="checkbox" />
          Auto collect submission results
        </label>
        <label>
          <input id="autoDownload" type="checkbox" />
          Auto hand off to local sync
        </label>
      </section>

      <section class="history">
        <div class="inline">
          <label for="historyLimit">Past accepted</label>
          <input id="historyLimit" type="number" min="1" max="300" step="1" value="100" />
        </div>
        <button id="history" type="button">Collect Past Accepted</button>
      </section>

      <section id="result" hidden>
        <dl>
          <div>
            <dt>Problem</dt>
            <dd id="problem">-</dd>
          </div>
          <div>
            <dt>Status</dt>
            <dd id="status">-</dd>
          </div>
          <div>
            <dt>File</dt>
            <dd id="path">-</dd>
          </div>
        </dl>

        <div class="actions">
          <button id="save" type="button">Save To Repo Folder</button>
          <button id="download" type="button">Download Files</button>
          <button id="copy" type="button">Copy Solution</button>
          <button id="commands" type="button">Copy Git Commands</button>
        </div>
      </section>

      <section class="queue">
        <p><strong id="queueCount">0</strong> queued exports</p>
        <div class="actions">
          <button id="saveQueue" type="button">Save Queue To Repo</button>
          <button id="downloadQueue" type="button">Hand Off Queue To Sync</button>
          <button id="clearQueue" type="button">Clear Queue</button>
        </div>
      </section>

      <p id="message" role="status"></p>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
